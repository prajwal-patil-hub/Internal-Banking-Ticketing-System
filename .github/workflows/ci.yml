name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app || true   # warn-only — full strictness rolls in over time

      - name: Pytest
        env:
          JWT_SECRET: test_secret_must_be_at_least_32_characters_long
          DATABASE_URL: sqlite+aiosqlite:///./test.db
        run: pytest -q || pytest --collect-only -q

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  docker:
    name: Docker — build prod images
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend prod image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: prod
          push: false
          tags: success-bank/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend prod image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: prod
          push: false
          tags: success-bank/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
