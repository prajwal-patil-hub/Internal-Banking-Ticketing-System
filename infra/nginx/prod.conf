# Reverse proxy: nginx -> { /api/* -> backend:8000, /metrics -> backend:8000, * -> frontend:80 }
upstream success_backend  { server backend:8000; }
upstream success_frontend { server frontend:80; }

server {
  listen 80;
  server_name _;

  client_max_body_size 12m;  # accommodate the 10 MB attachment cap + slack

  # API
  location /api/ {
    proxy_pass         http://success_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Prometheus
  location /metrics {
    proxy_pass         http://success_backend;
    allow              10.0.0.0/8;
    allow              192.168.0.0/16;
    allow              172.16.0.0/12;
    allow              127.0.0.1;
    deny               all;
  }

  # SPA
  location / {
    proxy_pass         http://success_frontend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  }
}
