# SUCCESS Bank — local development stack
# Usage:  docker compose -f infra/docker-compose.yml up -d
#
# Services:
#   postgres  : primary OLTP DB (Supabase-compatible schema lives in backend/alembic)
#   redis     : cache, rate-limit token buckets, SLA scheduler lock
#   minio     : S3-compatible object storage for ticket attachments
#   backend   : FastAPI app (hot reload in dev)
#   frontend  : Vite dev server (hot reload)
#
# Production deploys do NOT use this file — see infra/nginx + per-service Dockerfiles.

name: success-bank

services:
  postgres:
    image: postgres:15-alpine
    container_name: success-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-success}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-success_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-success_bank}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-success} -d ${POSTGRES_DB:-success_bank}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: success-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: success-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-successadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-successadmin_dev_pw}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev
    container_name: success-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-success}:${POSTGRES_PASSWORD:-success_dev_pw}@postgres:5432/${POSTGRES_DB:-success_bank}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: dev
    container_name: success-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
